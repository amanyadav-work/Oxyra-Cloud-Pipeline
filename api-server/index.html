<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Logs Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f9;
    }
    h1 {
      color: #333;
    }
    #logs {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      background-color: #fff;
      max-height: 400px;
      overflow-y: auto;
    }
    pre {
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #status {
      margin-top: 20px;
      font-size: 16px;
      color: #888;
    }
    #error {
      margin-top: 20px;
      font-size: 16px;
      color: red;
    }
  </style>
  <script>
    let ws;

    function connect(projectID) {
      document.getElementById('status').innerText = 'Connecting...'; // Show loading status
      document.getElementById('error').innerText = ''; // Clear previous errors
      ws = new WebSocket(`ws://localhost:8080/ws/logs/${projectID}`);

      ws.onopen = () => {
        console.log('WebSocket connection established');
        document.getElementById('status').innerText = 'Connected'; // Show connected status
      };

      ws.onmessage = (event) => {
        const data = event.data;
        console.log('Received data:', data);
        try {
          const jsonData = JSON.parse(data);
          const formattedData = JSON.stringify(jsonData, null, 2); // Format with indentation
          const logsDiv = document.getElementById('logs');
          // Append new log
          // Highlight URLs in the formatted JSON string
          const urlRegex = /(https?:\/\/[\w\-\.\?\,\'/\\\+&%\$#_=~:;@!\(\)]+)(?![^<]*>|[^\"]*?)/g;
          // Replace URLs with anchor tags and external link arrow
          const highlighted = formattedData.replace(urlRegex, function(url) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#0074d9;text-decoration:underline;">${url} <span style='font-size:13px;'>&#8599;</span></a>`;
          });
          const pre = document.createElement('pre');
          pre.innerHTML = highlighted;
          logsDiv.appendChild(pre);
          // Optionally, scroll to bottom
          logsDiv.scrollTop = logsDiv.scrollHeight;
        } catch (e) {
          console.error('Invalid JSON received:', e);
          document.getElementById('error').innerText = 'Error: Invalid JSON received!';
        }
      };

      ws.onclose = () => {
        console.log('WebSocket connection closed');
        document.getElementById('status').innerText = 'Connection closed'; // Show closed status
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        document.getElementById('error').innerText = `Error: ${error.message}`; // Show error message
      };
    }

    function startConnection() {
      const projectID = document.getElementById('projectID').value || 'test'; // Get ID from input or use 'test' as default
      connect(projectID);
    }

    window.onload = () => {
      startConnection(); // Automatically start with default projectID
    };
  </script>
</head>
<body>
  <h1>Logs Viewer (Append)</h1>
  
  <label for="projectID">Enter Project ID: </label>
  <input type="text" id="projectID" placeholder="Enter project ID" value="test">
  <button onclick="startConnection()">Connect</button>
  
  <div id="status">Waiting for connection...</div>
  <div id="error"></div>
  <div id="logs">Waiting for logs...</div>
</body>
</html>
